name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew build
      - run: docker build -t weather-proxy .
